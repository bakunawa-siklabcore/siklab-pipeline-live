name: Siklab Promotion Pipeline

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy'
        required: false
        type: string
      siklab_pipeline:
        description: 'Triggered by Siklab CI/CD pipeline'
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy-stg:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.event.inputs.siklab_pipeline == 'true'
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying commit ${{ github.event.inputs.commit_sha || github.sha }} to staging"
          # Replace with actual deployment commands:
          # e.g., rsync, scp, docker-compose, kubectl, etc.

  deploy-prod:
    name: Deploy to Production
    needs: deploy-stg
    runs-on: ubuntu-latest
    if: github.event.inputs.siklab_pipeline == 'true'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Promoting to production"
          # Replace with actual production deployment commands
